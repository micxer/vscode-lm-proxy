name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Validate version matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.version.outputs.version }}

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Version mismatch!"
            echo "  package.json version: $PACKAGE_VERSION"
            echo "  Git tag version: $TAG_VERSION"
            exit 1
          fi

          echo "✅ Version validation passed: $PACKAGE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run check
        continue-on-error: false

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npm run package

      - name: Verify VSIX file
        id: vsix
        run: |
          VSIX_FILE="vscode-lm-proxy-${{ steps.version.outputs.version }}.vsix"

          if [ ! -f "$VSIX_FILE" ]; then
            echo "Error: VSIX file not found: $VSIX_FILE"
            exit 1
          fi

          FILE_SIZE=$(du -h "$VSIX_FILE" | cut -f1)
          echo "✅ VSIX file created: $VSIX_FILE ($FILE_SIZE)"
          echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ steps.vsix.outputs.vsix_file }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-lm-proxy-${{ steps.version.outputs.version }}
          path: ${{ steps.vsix.outputs.vsix_file }}
          retention-days: 90
